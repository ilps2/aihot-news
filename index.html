body{background:#0a0a0f;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh;transition:none}
.layout{display:flex;min-height:100vh}

var currentTab = 'hot';
var activeTag = null;
var activeSource = null;

function filterSource(src) {
  event.stopPropagation();
  switchTab('all');
  activeSource = src;
  activeTag = null;
  renderContent();
}

var isDark = true;
var isCN = true;

function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('light', !isDark);
  var tb = document.getElementById('themeBtn'); if(tb) tb.textContent = isDark ? '🌙' : '☀️';
  var mb = document.getElementById('mThemeBtn'); if(mb) mb.textContent = isDark ? '🌙 暗黑' : '☀️ 亮色';
  localStorage.setItem('aihot_theme', isDark ? 'dark' : 'light');
}
function toggleLang() {
  isCN = !isCN;
  var lb = document.getElementById('langBtn'); if(lb) lb.textContent = isCN ? 'EN' : 'CN';
  var mlb = document.getElementById('mLangBtn'); if(mlb) mlb.textContent = isCN ? '🌐 English' : '🌐 中文';
  localStorage.setItem('aihot_lang', isCN ? 'cn' : 'en');
  renderContent();
}

var prefs = {};
var PREFS_KEY = 'aihot_prefs';
function loadPrefs() { try { prefs = JSON.parse(localStorage.getItem(PREFS_KEY)) || {}; } catch(e) { prefs = {}; } }
function savePrefs() { localStorage.setItem(PREFS_KEY, JSON.stringify(prefs)); }
function trackClick(idx) {
  var a = allNews[idx];
  if (!a || !a.tags) return;
  a.tags.forEach(function(t){ prefs[t]=(prefs[t]||0)+1; });
  savePrefs();
  if (currentTab === 'personal') renderContent();
}
function scoreMatch(a) {
  if (!a.tags || !a.tags.length) return 0;
  var s = 0;
  a.tags.forEach(function(t){ s += prefs[t]||0; });
  return s;
}
function compositeScore(a, prefBoost) {
  var p = prefBoost ? scoreMatch(a) : 0;
  var d = a.decay || 0.5;
  var au = a.authority || 0.5;
  return 0.3 * Math.min(p,3) + 0.3 * d + 0.4 * au;
}
function timeLabel(d) {
  if (d >= 1.0) return '刚刚';
  if (d >= 0.7) return '几小时内';
  if (d >= 0.3) return '今天';
  return '较早';
}

function buildTagFilter(articles) {
  var tagCount = {};
  articles.forEach(function(a) {
    (a.tags||[]).forEach(function(t){ tagCount[t]=(tagCount[t]||0)+1; });
  });
  var tags = Object.entries(tagCount).sort(function(a,b){return b[1]-a[1]}).slice(0,15);
  if (!tags.length) { document.getElementById('tagFilter').style.display = 'none'; return; }
  var html = '';
  tags.forEach(function(p){
    html += '<span class="tf-tag'+(activeTag===p[0]?' active':'')+'" onclick="setTag(\''+esc(p[0])+'\')">'+esc(p[0])+' <small>'+p[1]+'</small></span>';
  });
  document.getElementById('tagFilter').innerHTML = html;
}
function setTag(t) {
  activeTag = (activeTag === t) ? null : t;
  renderContent();
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.sidebar-tab,.mobile-tab').forEach(function(b){b.classList.remove('active')});
  var tabs = document.querySelectorAll('.sidebar-tab,.mobile-tab');
  tabs.forEach(function(b){ if(b.textContent.includes(tab==='hot'?'必读':tab==='all'?'全部':'推荐')) b.classList.add('active'); });
  renderContent();
}

function renderContent() {
  var articles, title, subtitle;
  var tagFilter = document.getElementById('tagFilter');

  if (currentTab === 'hot') {
    articles = allNews.filter(function(n){ return n.hot; });
    title = '🔥 今日必读';
    subtitle = articles.length + ' 篇高价值新闻';
    tagFilter.style.display = 'none';
  } else if (currentTab === 'all') {
    articles = allNews.slice().sort(function(a,b){ return compositeScore(b,false) - compositeScore(a,false); });
    title = '📋 全部新闻';
    subtitle = articles.length + ' 篇文章 · ' + (new Set(articles.map(function(n){return n.source}))).size + ' 个来源';
    buildTagFilter(articles);
    tagFilter.style.display = 'flex';
    if (activeSource) {
      articles = articles.filter(function(n){ return n.source === activeSource; });
      subtitle = articles.length + ' 篇 · 来源: ' + activeSource + ' <span style="color:var(--active);font-size:11px;cursor:pointer;margin-left:8px" onclick="activeSource=null;renderContent()">✕ 清除</span>';
    }
    if (activeTag) {
      articles = articles.filter(function(n){ return (n.tags||[]).indexOf(activeTag) >= 0; });
      subtitle = articles.length + ' 篇 · 标签: ' + activeTag;
    }
  } else {
    articles = allNews.slice().sort(function(a,b){ return compositeScore(b,true) - compositeScore(a,true); });
    title = '🎯 为你推荐';
    subtitle = articles.slice(0,30).length + ' 篇个性化排序';
    tagFilter.style.display = 'none';
    articles = articles.slice(0, 30);
  }

  document.getElementById('tabTitle').textContent = title;
  document.getElementById('tabStats').textContent = subtitle;

  if (!articles.length) {
    document.getElementById('content').innerHTML = currentTab==='personal' ? '<div style="text-align:center;padding:60px;color:var(--text3)">还没有偏好数据<br><small>去「全部新闻」点几篇感兴趣的，回来就有推荐了 🎯</small></div>' : '<div style="text-align:center;padding:60px;color:var(--text3)">暂无新闻</div>';
    return;
  }

  var html = articles.map(function(n){ return cardHtml(n, currentTab==='personal'); }).join('');
  document.getElementById('content').innerHTML = html;
}

function cardHtml(n, showScore) {
  var idx = allNews.indexOf(n);
  var displayTitle = (!isCN && n.title_en) ? n.title_en : n.title;
  var summaryHtml = n.summary ? '<div class="summary">'+esc(n.summary)+'</div>' : '';
  var tagsHtml = (n.tags||[]).length ? n.tags.map(function(t){return '<span class="tag">'+esc(t)+'</span>'}).join('') : '';
  var scoreHtml = showScore && scoreMatch(n)>0 ? '<span class="match-score">匹配 +'+scoreMatch(n)+'</span>' : '';
  var timeHtml = '<span style="font-size:10px;color:var(--text3)">'+timeLabel(n.decay||0.5)+'</span>';
  return '<div class="card">'+
    '<div class="source"><span class="badge" onclick="filterSource(\''+esc(n.source)+'\')" title="只看此来源">'+esc(n.source)+'</span>'+esc(n.cat)+tagsHtml+'<span style="margin-left:auto">'+timeHtml+'</span></div>'+
    '<h3><a href="'+esc(n.url)+'" target="_blank" onclick="trackClick('+idx+')">'+esc(displayTitle)+'</a></h3>'+
    summaryHtml+
    (showScore && scoreMatch(n)>0 ? '<div class="link-row">'+scoreHtml+'</div>' : '')+
    '</div>';
}

function esc(s) { var d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }

(function(){
  if (localStorage.getItem('aihot_theme')==='light') { document.body.className='light'; document.documentElement.style.colorScheme='light dark'; var tb=document.getElementById('themeBtn'); if(tb) tb.textContent='☀️'; var mb=document.getElementById('mThemeBtn'); if(mb) mb.textContent='☀️ 亮色'; } else { document.documentElement.style.colorScheme='dark'; }
  if (localStorage.getItem('aihot_lang')==='en') { isCN=false; document.getElementById('langBtn').textContent='CN'; }
})();
loadPrefs();
renderContent();

</script>
