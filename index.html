var currentMode = 'all';

// ---- Preference engine ----
var PREFS_KEY = 'aihot_prefs';
var prefs = {};

function loadPrefs() {
  try { prefs = JSON.parse(localStorage.getItem(PREFS_KEY)) || {}; } catch(e) { prefs = {}; }
}
function savePrefs() { localStorage.setItem(PREFS_KEY, JSON.stringify(prefs)); }
function showPrefs() {
  var top = Object.entries(prefs).sort(function(a,b){return b[1]-a[1]}).slice(0,8);
  var bar = document.getElementById('prefBar');
  if (!top.length) { bar.style.display = 'none'; return; }
  bar.style.display = 'block';
  bar.innerHTML = '🧠 你的偏好：' + top.map(function(p){return '<span class="pref-tag">'+esc(p[0])+' ×'+p[1]+'</span>'}).join('') + '<button class="clear-btn" onclick="clearPrefs()">清空</button>';
}

function trackClick(newsIdx) {
  var article = allNews[newsIdx];
  if (!article || !article.tags) return;
  article.tags.forEach(function(tag) {
    prefs[tag] = (prefs[tag]||0) + 1;
  });
  savePrefs();
  showPrefs();
  if (currentMode === 'personal') renderCards();
}

function clearPrefs() {
  prefs = {};
  savePrefs();
  showPrefs();
  if (currentMode === 'personal') renderCards();
}

function compositeScore(article, prefBoost) {
  // 3D score: 0.3×偏好 + 0.3×时间衰减 + 0.4×来源权威
  var p = prefBoost ? scoreMatch(article) : 0;
  var d = article.decay || 0.5;
  var a = article.authority || 0.5;
  return 0.3 * Math.min(p, 3) + 0.3 * d + 0.4 * a;
}

function scoreMatch(article) {
  if (!article.tags || !article.tags.length) return 0;
  var score = 0;
  article.tags.forEach(function(tag) {
    score += prefs[tag] || 0;
  });
  return score;
}

function timeLabel(decay) {
  if (decay >= 1.0) return '刚刚';
  if (decay >= 0.7) return '几小时内';
  if (decay >= 0.3) return '今天';
  return '较早';
}

// ---- Render ----
function renderCards() {
  var articles;
  if (currentMode === 'personal') {
    // Sort by composite score with preference boost
    articles = allNews.slice().sort(function(a,b){ return compositeScore(b,true) - compositeScore(a,true); });
    articles = articles.slice(0, 30);
  } else if (currentMode === 'all') {
    // Sort by composite score (no pref boost since no history yet)
    articles = allNews.slice().sort(function(a,b){ return compositeScore(b,false) - compositeScore(a,false); });
  } else {
    articles = allNews.filter(function(n){ return (n.cat||'').indexOf(currentMode) >= 0 });
    articles.sort(function(a,b){ return compositeScore(b,false) - compositeScore(a,false); });
  }

  if (currentMode === 'personal') {
    var top = articles.filter(function(n){ return n.hot && scoreMatch(n) > 0; });
    var rest = articles.filter(function(n){ return !(n.hot && scoreMatch(n) > 0); });
    var html = '';
    if (top.length) {
      html += '<div class="section-title personal">🎯 为你推荐</div>';
      top.forEach(function(n){ html += cardHtml(n, true) });
    }
    if (rest.length) {
      if (top.length) html += '<div class="section-title news">📰 全部动态</div>';
      rest.forEach(function(n){ html += cardHtml(n, false) });
    }
    if (!html) html = '<div class="empty">还没有偏好数据，先去「全部」里点几篇感兴趣的新闻吧 🎯<br><small>点击「阅读原文」后我会自动学习你的偏好</small></div>';
    document.getElementById('content').innerHTML = html;
    return;
  }

  var top = articles.filter(function(n){ return n.hot });
  var rest = articles.filter(function(n){ return !n.hot });
  var html = '';
  if (top.length) {
    html += '<div class="section-title fire">🔥 今日必读</div>';
    top.forEach(function(n,i){ html += cardHtml(n, false) });
  }
  if (rest.length) {
    html += '<div class="section-title news">📰 更多动态</div>';
    rest.forEach(function(n){ html += cardHtml(n, false) });
  }
  if (!html) html = '<div class="empty">暂无此类新闻</div>';
  document.getElementById('content').innerHTML = html;
}

function cardHtml(n, showScore) {
  var summaryHtml = n.summary ? '<div class="summary">' + esc(n.summary) + '</div>' : '';
  var tagsHtml = (n.tags||[]).length ? '<div class="tags">' + n.tags.map(function(t){return '<span class="tag">'+esc(t)+'</span>'}).join('') + '</div>' : '';
  var scoreHtml = showScore && scoreMatch(n) > 0 ? '<span class="match-score">匹配度 +'+scoreMatch(n)+'</span>' : '';
  var timeHtml = '<span style="font-size:10px;color:#555">'+timeLabel(n.decay||0.5)+'</span>';
  var idx = allNews.indexOf(n);
  var displayTitle = (!isCN && n.title_en) ? n.title_en : n.title;
  return '<div class="card">' +
    '<div class="source"><span class="badge">' + esc(n.source) + '</span>' + esc(n.cat) + timeHtml + '</div>' +
    '<h3><a href="' + esc(n.url) + '" target="_blank" onclick="trackClick('+idx+')">' + esc(displayTitle) + '</a></h3>' +
    summaryHtml + tagsHtml +
    '<div class="link-row">'+scoreHtml+'<a class="link-btn" href="' + esc(n.url) + '" target="_blank" onclick="trackClick('+idx+')">📖 阅读原文 →</a></div>' +
    '</div>';
}

function esc(s) { var d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }

function switchMode(m) {
  currentMode = m;
  document.querySelectorAll('.nav button').forEach(function(b){b.classList.remove('active')});
  event.target.classList.add('active');
  renderCards();
}


var isDark = true;
var isCN = true;
var originalTitles = {};

function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('light', !isDark);
  document.getElementById('themeBtn').textContent = isDark ? '🌙 暗黑' : '☀️ 亮色';
  localStorage.setItem('aihot_theme', isDark ? 'dark' : 'light');
}

function toggleLang() {
  isCN = !isCN;
  document.getElementById('langBtn').textContent = isCN ? '🌐 EN' : '🌐 中文';
  localStorage.setItem('aihot_lang', isCN ? 'cn' : 'en');
  renderCards();
}

// Load saved theme
(function() {
  var saved = localStorage.getItem('aihot_theme');
  if (saved === 'light') { isDark = false; document.body.classList.add('light'); document.getElementById('themeBtn').textContent = '☀️ 亮色'; }
  var savedLang = localStorage.getItem('aihot_lang');
  if (savedLang === 'en') { isCN = false; document.getElementById('langBtn').textContent = '🌐 中文'; }
})();

// ---- Init ----
loadPrefs();
showPrefs();
renderCards();
</script>
