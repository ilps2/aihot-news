var currentFilter = 'all';

function renderCards() {
  var filtered = currentFilter === 'all' ? allNews : allNews.filter(function(n){ return (n.cat||'').indexOf(currentFilter) >= 0 });
  var top = filtered.filter(function(n){ return n.hot });
  var rest = filtered.filter(function(n){ return !n.hot });
  var html = '';
  if (top.length) {
    html += '<div class="section-title fire">🔥 今日必读</div>';
    top.forEach(function(n){ html += cardHtml(n) });
  }
  if (rest.length) {
    html += '<div class="section-title news">📰 更多动态</div>';
    rest.forEach(function(n){ html += cardHtml(n) });
  }
  if (!html) html = '<div class="empty">暂无此类新闻</div>';
  document.getElementById('content').innerHTML = html;
}

function cardHtml(n) {
  var summaryHtml = n.summary ? '<div class="summary">' + esc(n.summary) + '</div>' : '';
  return '<div class="card">' +
    '<div class="source"><span class="badge">' + esc(n.source) + '</span>' + esc(n.cat) + '</div>' +
    '<h3><a href="' + esc(n.url) + '" target="_blank">' + esc(n.title) + '</a></h3>' +
    summaryHtml +
    '<div class="link-row"><a class="link-btn" href="' + esc(n.url) + '" target="_blank">📖 阅读原文 →</a></div>' +
    '</div>';
}

function esc(s) { var d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }

function filterCards(f) {
  currentFilter = f;
  document.querySelectorAll('.nav button').forEach(function(b){b.classList.remove('active')});
  event.target.classList.add('active');
  renderCards();
}
